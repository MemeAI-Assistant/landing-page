<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MemeFinder</title>
    <script>
      // Redirect unknown GitHub Pages paths back to index.html while preserving route.
      var segmentCount = 1;
      var l = window.location;
      var origin = l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "");
      var repoBase = l.pathname.split("/").slice(0, 1 + segmentCount).join("/");
      var route = l.pathname.slice(1).split("/").slice(segmentCount).join("/");
      var query = l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "";

      l.replace(origin + repoBase + "/?/" + route.replace(/&/g, "~and~") + query + l.hash);
    </script>
  </head>
  <body></body>
</html>
